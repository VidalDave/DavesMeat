services:
  - type: web
    name: product-order-app
    runtime: docker
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: product-order-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production

databases:
  - name: product-order-db
    plan: starter

